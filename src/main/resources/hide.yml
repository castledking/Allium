############################################################
# +------------------------------------------------------+ #
# |                     Hide Config                      | #
# +------------------------------------------------------+ #
############################################################
# Here you can configure the hidden commands.
# You can use the following formats:
# - command
# - <plugin>:*
# - ^ (uses commands list)
# - * (all commands)
# Vault is required.
# For more information, visit: https://github.com/castledking/Allium

settings:
  enabled: true
  block-namespaced-commands-for-ops: false
  hide-namespaced-commands-for-ops: false
groups:
  op: # (allium.hide.bypass permission)
    whitelist: true
    commands:
      - "*"
    tabcompletes:
      - ^
  admin:
    whitelist: true
    commands:
      - "essentials:*"
      - "worldedit:*"
      - op
      - deop
    tabcompletes:
      - ^

  moderator:
    whitelist: false
    commands:
      - op
      - deop
    tabcompletes:
      - ^

  default:
    whitelist: true
    commands:
      - tpa
      - tpahere
      - help
      - tpaccept
      - tpdeny
      - tpyes
      - tpno
      - tpcancel
      - tptoggle
      - spawn
      - back
      - msg
      - reply
      - r
      - party
      - mail
    tabcompletes:
      - ^

  # Alt accounts - blacklist mode: listed commands are blocked for alt accounts
  # whitelist=false means these commands are BLOCKED (blacklist)
  # whitelist=true means ONLY these commands are allowed
  alt:
    whitelist: false
    commands:
      - pay
      - jobs
      - quests
      - tasks
      - ah
      - auctionhouse
    tabcompletes:
      - ^
