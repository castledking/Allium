############################################################
# +------------------------------------------------------+ #
# |                     Configuration                    | #
# +------------------------------------------------------+ #
############################################################
# This is the main configuration file for Allium.
# For more information, visit: https://github.com/castledking/Allium

# Language for lang.yml
lang: en
server-name: "Unknown Server"

# "core.*" to "allium.*" Permissions migration
group_migration_completed: false
player_migration_completed: false

# Debug options (debug-mode can also be toggled via /core debug)
# debug-scheduler: when true, logs runAtEntity/runAtEntityLater scheduler activity (very verbose on Folia)
debug-scheduler: false

############################################################
# +------------------------------------------------------+ #
# |                 Update Checker                       | #
# +------------------------------------------------------+ #
############################################################
# Checks SpigotMC for new versions on startup.
# notify-mode: off = disabled, console = log to console only,
#   in-game = notify players with allium.admin on join, both = console + in-game
update-checker:
  enabled: true
  notify-mode: both

############################################################
# +------------------------------------------------------+ #
# |                 Discord Settings                     | #
# +------------------------------------------------------+ #
############################################################

# Discord integration settings
discord:
  # Webhook for escalation command
  escalate_webhook: ""
  
  # List of role IDs to mention in escalation messages
  escalate_mentions: []
  
  # Bot display name (optional)
  bot_name: "Server Escalation"
  
  # Bot avatar URL (optional)
  bot_avatar: ""

############################################################
# +------------------------------------------------------+ #
# |                 Maintenance Settings                 | #
# +------------------------------------------------------+ #
############################################################

maintenance: # A list of player UUIDs that bypass maintenance mode.
  bypass: []

############################################################
# +------------------------------------------------------+ #
# |                 Dialog Settings                      | #
# +------------------------------------------------------+ #
############################################################

dialog:
  # If true, dialogs are registered via native datapack (requires enabling AlliumDialogs once).
  # If false, dialogs are shown inline at runtime without touching datapacks.
  use-datapack: true
  # Delay before auto-showing dialogs on player join (in ticks). Helps avoid join-time races.
  auto-show-join-delay-ticks: 40

############################################################
# +------------------------------------------------------+ #
# |                 Chat Settings                        | #
# +------------------------------------------------------+ #
############################################################
# This section configures various aspects of the chat system.
# Each setting is explained in detail below.  Make sure to
# save and reload/restart the server after making changes.

# Available placeholders:
#   <player> - The player's real name.
#   <display_name> or <name> - The player's display name. (/nick)
#   <prefix> - The player's prefix.
#   <suffix> - The player's suffix.
#   <message> - The message being sent.
#   %{placeholder}% - PlaceholderAPI support.

enable-chat-formatting: true # Vault or forks of Vault are required for this to work.
block-unicode: true # Set to false to allow Unicode symbols

chat:
  deletion_resend:
    clear_lines: 500  # Number of invisible unicode lines to send before header (clears chat)
    header_enabled: true
    header: "&8&oChat re-synced by staff; a message was deleted"
    
chat-format:
  default: "<prefix> &a%allium_nickname%&f: &f<message>"
  groups:
    #admin: "&4[Admin] &c<player>&f: <message>"
    #moderator: "&2[Mod] &a<player>&f: <message>"
    #vip: "&6[VIP] &e<player>&f: <message>"

# Here you can create custom hover/click events per group.
# Available actions:
# - suggest-command
# - run-command
# - open-url
# - copy-to-clipboard

chat-hover:
  # Players with allium.deletemsg will see an additional line in the hover text
  # for all groups that shows the message ID and allows them to delete the message.
  # Here you can change the mode to prefix, name, suffix, or none to disable.
  # If a player has no prefix or suffix the deletion hover will default to name.
  #
  # Note: Players with allium.deletemsg will overwrite your settings
  # with a suggest command of /delmsg <messageId> on click.
  delete-hover-mode: prefix
  
  groups:
    default:
      prefix:
        hover:
          - '&7{prefix}&r {player}'
        action: 'run-command'
      click: '/help'
      name:
        hover:
          - '&7Click to message {player}'
        action: 'suggest-command'
        click: '/msg {player} '
#     suffix:
#       hover:
#         - '&7Click to message {player}'
#       action: 'run-command'
#       click: '/msg {player}'
# Add more groups here:
#   owner:
#     prefix:
#     name:
#     suffix:
#   moderator:
#     prefix:
#     name:
#     suffix:
#   vip:
#     prefix:
#     name:
#     suffix:


############################################################
# +------------------------------------------------------+ #
# |                 General Settings                     | #
# +------------------------------------------------------+ #
############################################################

# Auto Restart Configuration
auto-restart:
  # Enable or disable the auto-restart feature
  enabled: false
  
  # List of times when the server should restart (24-hour format, HH:MM)
  times:
    - "04:00"  # 4:00 AM
    - "12:00"  # 12:00 PM
    - "20:00"  # 8:00 PM
  
  # Commands to run before restart (30 seconds before by default, configurable with command-delay)
  pre-commands:
    - "save-all"
    - "say Server restarting in 30 seconds!"
  
  # Delay in seconds before restart to execute pre-commands (default: 30 seconds)
  command-delay: 30
  
  # Times in seconds to show countdown messages (relative to restart time)
  countdown-times: [60, 30, 15, 10, 5, 4, 3, 2, 1]
  
  # Whether to automatically restart the server after a crash (requires a server wrapper)
  restart-on-crash: true
  
  # Whether to save the world before restarting
  save-before-restart: true

# Here you can add the specific commands that allium.player 
# will have permission to use.
commands:
  - help
  - tpa
  - spawn
  - tppet
  - mail
  - mail.send
  - mail.gift
  - mail.read
  - msg
  - reply
  - home
  - sethome
  - delhome
  - tpaccept
  - tpdeny
  - tptoggle
  - balance
  - baltop
  - back
  - pay
  - tpcancel
  - tpahere
  - party

party-manager:
  # When true, hides non-party members beyond radius from locator bar (requires PacketEvents)
  # Set to false automatically when PacketEvents is not available; /party commands still work
  party-locator-bar: true
  
  # Amount of blocks to start showing non-party members. (shows up on locator bar)
  show-non-party-members-radius: 128 # 128 is default

  # Sync party commands with mcMMO parties. When true, create/join/leave/disband also update mcMMO
  # so Allium and mcMMO parties stay in sync. Only runs if mcMMO is installed.
  sync-with-mcmmo: true

creative-manager:
  # Here you can add blocks and entities that will be
  # blacklisted from being place, broken or spawned in creative mode.
  #
  # Note: this blacklist is only used if the player
  # already has the appropriate bypass permission:
  # Currently handling:
  # - allium.gamemode.creative.break
  # - allium.gamemode.creative.place
  # - allium.gamemode.creative.spawn
  blacklist:
    blocks: []
    entities: []

spawnercraft:
  # Controls how crafted spawners are delivered:
  # Vanilla = give a normal vanilla spawner item directly
  # UpgradableSpawners = dispatch the UpgradableSpawners admin give command
  # SpawnerMeta = dispatch the /sm give command structure
  protocol: Vanilla

# Creeper explosion regen speed (0 = disabled, 1 = slowest, 10 = fastest)
creeper-explosion-regen-speed: 5

allow-unsafe-enchants: false
#  Should we allow unsafe enchantments to be applied?
#  Unsafe enchantments are those that exceed the normal level limits.
#  Default: false

redeem-settings:
  # List of players eligible to redeem a rank.
  # Format: "<UUID>:<rank_name_lowercase>"
  # Example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx:iron"
  players-to-redeem:
    - "00000000-0000-0000-0000-000000000001:iron"
    - "00000000-0000-0000-0000-000000000002:gold"

  # Commands to run for each rank when a player redeems.
  # Ranks are determined by the suffix in the 'players-to-redeem' list (e.g., 'uuid:iron' means the rank is 'iron').
  # Placeholders: {player} (player's name)
  commands-to-run:
    iron:
      - "lp user {player} parent set iron"
      - "minecraft:xp add {player} 100 points"
      - "money give {player} 500"
    gold:
      - "lp user {player} parent set gold"
      - "minecraft:xp add {player} 250 points"
      - "money give {player} 1500"
    emerald:
      - "lp user {player} parent set emerald"
      - "minecraft:xp add {player} 500 points"
      - "money give {player} 3000"
    netherite:
      - "lp user {player} parent set netherite"
      - "minecraft:xp add {player} 1000 points"
      - "money give {player} 5000"

############################################################
# +------------------------------------------------------+ #
# |                   Give Settings                      | #
# +------------------------------------------------------+ #
############################################################

give:
  # Whether to drop overflow items when player's inventory is full
  drop-overflow-items: true
  
  # Maximum number of items that can be dropped when inventory is full
  # Set to -1 for unlimited, or any positive number to limit drops
  max-items-dropped: 64

############################################################
# +------------------------------------------------------+ #
# |                 Command Settings                     | #
# +------------------------------------------------------+ #
############################################################

explode-command:
  default: 2
  # Default radius of the explosion caused by the /explode command.
  # Must be within the 'min' and 'max' values specified below.
  # Default: 2
  max: 10
  # Maximum allowed radius for the /explode command.
  # Default: 10
  min: 1
  # Minimum allowed radius for the /explode command.
  # Default: 1

heal:
  cooldown: 60
  # Time in seconds players without allium.heal.nocooldown

home:
  cooldown: 60
  # Time in seconds players without allium.home.nocooldown
  show-location: false
  # Whether to show the location of the home in the tp message.
  spawn-if-no-home: true
  # If no home is set, would you like to send the player to spawn?

feed:
  cooldown: 60
  # Time in seconds players without allium.feed.nocooldown

mail:
  cooldown: 15

teleport:

  delay: 3
  # Time in seconds players without allium.tpa.nodelay
  cooldown: 30
  # Time in seconds players without allium.tpa.nocooldown
  expire: 120
  # Time in seconds a request expires.
  tppet-radius: 30
  # Maximum radius in blocks the player can be from the pet.

############################################################
# +------------------------------------------------------+ #
# |                 Item Settings                        | #
# +------------------------------------------------------+ #
############################################################

handcuffs:
  commands-on-quit:
    - ban {player} Logged out while restrained

############################################################
# +------------------------------------------------------+ #
# |                 Economy Settings                     | #
# +------------------------------------------------------+ #
############################################################

economy:
  # Currency symbol to use when displaying money amounts
  # Examples: $, €, £, ¥, ₽, etc.
  currency-symbol: "$"
  
  # Default starting balance for new players
  starting-balance: 100.00

  allow-negative-balance: false
  
  # Maximum number of decimal places to display
  decimal-places: 2
  
  # Whether to show the currency symbol before or after the amount
  # true = $100, false = 100$
  symbol-before-amount: true
  
  # Whether to add a space between the amount and symbol
  # true = 100 $, false = 100$
  # Only applies when symbol-before-amount is false
  space-between: false

############################################################
# +------------------------------------------------------+ #
# |                 World Settings                       | #
# +------------------------------------------------------+ #
############################################################

world-defaults:
  world: # Replace 'world' with the actual world name
    - send-command-feedback: false
      #  Whether or not command feedback (e.g., "Command executed successfully")
      #  is sent to players in this world.
      #  Default: false

#  You can add more worlds here by creating new sections like this:
#  world_nether:
#    - send-command-feedback: true
#
#  world_the_end:
#    - send-command-feedback: false

# Version of the config file (do not modify)
version: 0.1.5a
