    - "&cServer frozen for safety reasons. Please wait for a few seconds."
    - "[sound] block.glass.break 1 0.5"
  unfrozen-message: 
    - "&aYou are no longer frozen."
    - "[sound] block.glass.place 1 1.5"
  frozen: 
    - "&aYou have frozen &e{player}&a."
    - "[sound] block.glass.break 1 0.8"
  unfrozen: 
    - "&aYou have unfrozen &e{player}&a."
    - "[sound] block.glass.place 1 1.2"
  freeze-all-success: "&aYou have frozen all players. Reason: &e{reason}&a."
  unfreeze-all-success: "&aYou have unfrozen all players."
  unfreeze-all-message: "&aAll players have been unfrozen."
  already-frozen: "&e{player} &cis already frozen."
  not-frozen: "&e{player} &cis not frozen."
  multiple-frozen: "&cMultiple players are frozen. Please specify which player to unfreeze:"
  specify-player: "&eUsage: /unfreeze <player>"
  no-frozen-players: "&cNo players are currently frozen."
  resist: "&c{player} has freeze resistance and cannot be frozen."