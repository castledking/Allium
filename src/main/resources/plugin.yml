  allium.player:
    description: "Gives access to player commands"
    default: true
  allium.staff:
    description: "Gives access to staff commands"
    default: op
    children:
      allium.escalate: true
      allium.spy: true
      allium.spy.others: true
      allium.gamemode: true
      allium.gamemode.spectator: true
      allium.nv: true
      allium.note: true
      allium.notes: true
      allium.unnote: true
      allium.invsee: true
      allium.tp: true
      allium.tp.others: true
