# Build the JAR and create a GitHub Release.
# Publishing the release fires spigot-release.yml, which handles Modrinth/SpigotMC/Discord.
name: Release on Tag

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty for latest tag)'
        required: false
        type: string

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Build with Maven
        run: mvn install -DskipTests -B

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION=${{ inputs.version }}
          elif [ -n "${GITHUB_REF#refs/tags/}" ] && [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null)
          fi
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Find JAR
        id: find-jar
        run: |
          JAR=$(find target -name "Allium*.jar" -not -name "*-javadoc.jar" -not -name "*-sources.jar" | head -n1)
          echo "jar=${JAR}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE=".release/latest/v${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            TITLE=$(head -n1 "$NOTES_FILE")
            echo "title=${TITLE}" >> $GITHUB_OUTPUT
            echo "has_notes=true" >> $GITHUB_OUTPUT
          else
            echo "title=Allium v${VERSION}" >> $GITHUB_OUTPUT
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR="${{ steps.find-jar.outputs.jar }}"
          TITLE="${{ steps.notes.outputs.title }}"
          NOTES_FILE=".release/latest/v${VERSION}.md"

          ARGS=()
          if [ -n "$JAR" ]; then
            ARGS+=("$JAR")
          fi
          if [ "${{ steps.notes.outputs.has_notes }}" = "true" ]; then
            gh release create "v${VERSION}" --title "$TITLE" --notes-file "$NOTES_FILE" "${ARGS[@]}"
          else
            gh release create "v${VERSION}" --title "$TITLE" --generate-notes "${ARGS[@]}"
          fi
