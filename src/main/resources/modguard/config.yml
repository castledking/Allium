# ModGuard - Client Mod Detection
# Runtime path: plugins/Allium/modguard/config.yml

# Enable mod detection
enabled: true

# Detection mode: 'blacklist' (ban specific mods) or 'whitelist' (allow only specific mods)
mode: blacklist

# Check for mods when player joins (delayed by check-delay-ticks)
check-on-join: true

# Kick players when banned mods are detected
kick-on-detection: true

# Delay after join before checking (ticks). Allows all mod channels to register.
check-delay-ticks: 40

# Mod detection uses translation-key probe only (see translation-probe > checks below)

# Kick message shown to players using banned mods
# Use {mod} for the detected mod name and {player} for player name.
kick-message: |-
  &c&lMODIFIED CLIENT DETECTED

  &7You have been kicked from the server.
  &7Reason: &cBanned modification detected

  &7Detected mod: &e{mod}

  &7Please remove this mod and rejoin.

# Alert sent to staff when player is kicked for banned mod.
staff-alert: "&7[&c&lModGuard&7] &e{player} &7was kicked for using: &c{mod}"

# Log format for detected mods.
detection-log: "&7[ModGuard] Detected mods for {player}: {mods} (brand: {brand})"

# Notify staff with permission when players join with any mods (not just banned).
notify-staff: true

# Staff permission for notifications.
staff-permission: "modguard.notify"

# Bypass permission - players with this permission won't be checked.
bypass-permission: "modguard.bypass"

# Log all detected mods to console (not just banned ones).
log-all-mods: false

# Log detection events (kicks, banned mods found).
log-detections: true

# Translation-key probe detection.
# Requires PacketEvents. Sends a virtual sign with a translation key in the text component,
# then listens for the client to echo it back. If the client has the mod registered,
# it resolves the translation key and echoes the translated value instead of the fallback.
#
# The `expected` list is optional. When empty, ANY response different from the fallback
# counts as detection — this is safe for unique mod keys like inventoryprofiles.*.
# When non-empty, only exact matches to expected values trigger detection.
translation-probe:
  enabled: true
  default-action: alert
  delay-ticks: 10
  timeout-ticks: 30
  fallback-prefix: "allium_probe_"
  alert-message: "&7[&cModGuard&7] &e{player} &7hit translation probe &c{check} &8(&f{key}&8) &7resolved=&f{resolved} &7confidence=&e{confidence}&7 action=&e{action}"
  checks:
    meteor-client:
      enabled: true
      key: "key.meteor-client.open-gui"
      display-name: "Meteor Client"
      action: kick
      require-corroboration-for-kick: false

    # Inventory Profiles Next (IPN) — 617 translation keys under inventoryprofiles.*
    ipn-sort-inventory:
      enabled: true
      key: "inventoryprofiles.config.name.sort_inventory"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-sort-columns:
      enabled: true
      key: "inventoryprofiles.config.name.sort_inventory_in_columns"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-sort-rows:
      enabled: true
      key: "inventoryprofiles.config.name.sort_inventory_in_rows"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-move-all:
      enabled: true
      key: "inventoryprofiles.config.name.move_all_items"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-throw-all:
      enabled: true
      key: "inventoryprofiles.config.name.throw_all_items"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-config-menu:
      enabled: true
      key: "inventoryprofiles.config.name.open_config_menu"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-lock-slots:
      enabled: true
      key: "inventoryprofiles.config.name.enable_lock_slots"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-auto-refill:
      enabled: true
      key: "inventoryprofiles.config.name.enable_auto_refill"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-profiles:
      enabled: true
      key: "inventoryprofiles.config.name.enable_profiles"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-tweaks:
      enabled: true
      key: "inventoryprofiles.gui.config.Tweaks"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-tooltip-sort:
      enabled: true
      key: "inventoryprofiles.tooltip.sort_button"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-tooltip-settings:
      enabled: true
      key: "inventoryprofiles.tooltip.settings_open"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false
    ipn-title:
      enabled: true
      key: "inventoryprofiles.gui.config.title"
      display-name: "Inventory Profiles Next"
      action: kick
      require-corroboration-for-kick: false

    # libIPN — shared UI library used by IPN (alert-only, allows libIPN without blocking IPN)
    libipn-advanced-keys:
      enabled: true
      key: "libipn.common.gui.config.advanced_keybind_settings"
      display-name: "libIPN"
      action: alert
    libipn-keybind-tips:
      enabled: true
      key: "libipn.common.gui.config.keybind_settings_tips"
      display-name: "libIPN"
      action: alert
