# Heal command messages
# Placeholders: 
#   {player} - The healer's name
#   {name} - The target player's name
#   {count} - Number of entities affected
#   {selector} - The selector used
heal:
  # When a player heals themselves
  self: 
    - "&aYou have been healed."
    - "[sound] entity.player.levelup 0.5 1.5"
    - "[particle] HEART 5 0.1 0 0.5 0"  # count=5, speed=0.1, x=0, y=0.5, z=0
  
  # When a player is healed by someone else
  other: 
    - "&aYou have been healed by &e{player}&a."
    - "[sound] entity.player.levelup 0.5 1.5"
    - "[particle] HEART 5 0.1 0 0.5 0"
  
  # When you heal another player
  healed-other: 
    - "&aSuccessfully healed &e{name}&a."
    - "[sound] entity.player.levelup 0.5 1.5"
  
  # When using selectors (@a, @p, etc.)
  selector: 
    - "&aHealed &e{count} &aentities matching selector &e{selector}&a."
    - "[sound] entity.player.levelup 0.5 1.5"
  
  # For the /heal command when used on others
