name: Allium
version: 0.1.4a
main: net.survivalfun.core.PluginStart
api-version: 1.21
folia-supported: true
author: towkio
description: "A secure, modern Essentials solution."
soft-depend: [Vault, PlaceholderAPI, packetevents, floodgate, mcMMO, LuckPerms]
loadafter: [PlaceholderAPI, mcMMO, packetevents, PacketEvents, Vault, LuckPerms]

commands:
  nickname:
    description: "Open the nickname customization GUI"
    usage: "/nickname"
    permission: allium.nick.gui
    aliases: [nick]
    
  redeem:
    description: Allows eligible players to redeem a rank and rewards.
    usage: /redeem
    aliases: [claimrank] # Optional alias
  explode:
    description: "Explodes target player"
    usage: "/explode <player> [modifier]"
    permission: allium.explode
  gc:
    description: "Displays server details"
    usage: "/gc"
    permission: allium.gc
  give:
    description: "Give items to players"
    usage: "/give <player> <item> <amount>"
    permission: allium.give
    aliases: [i]
  itemdb:
    description: "Shows item/block info"
    usage: "/itemdb"
    permission: allium.itemdb
  heal:
    description: "Heal players"
    usage: "/heal [player]"
    permission: allium.heal
  freeze:
    description: "Freeze players"
    usage: "/freeze [player]"
    permission: allium.freeze
  unfreeze:
    description: "Unfreeze players"
    usage: "/unfreeze [player]"
    permission: allium.unfreeze
  feed:
    description: "Feed players"
    usage: "/feed [player]"
    permission: allium.feed
  core:
    description: "Core plugin command. Subcommands: reload, debug, voucher, etc."
    usage: "/core"
    aliases: [allium]
  rename:
    description: "Rename item in main hand"
    usage: "/rename <name>"
    permission: allium.rename
  lore:
    description: "Mange lore in main hand"
    usage: "/lore <add|remove|clear> <text>"
    permission: allium.lore
  god:
    description: "Toggle god mode"
    usage: "/god || /god <player>"
    permission: allium.god
  more:
    description: "Adds more items to your inventory"
    usage: "/more"
    permission: allium.more
  fly:
    description: "Toggle flight"
    usage: "/fly || /fly <player>"
    permission: allium.fly
  gamemode:
    description: "Change gamemode"
    usage: "/gamemode <gamemode> <player>"
    permission: allium.gamemode
    aliases: [gm, gmc, gms, gma, gmsp, survival, creative, adventure, spectator]
  nv:
    description: "Toggle night vision"
    usage: "/nv"
    permission: allium.nv
  vanish:
    description: "Toggle vanish mode with level-based visibility system"
    usage: "/vanish [level|<player> [level]]"
    permission: allium.vanish
    aliases: [v]
  v:
    description: "Short alias for vanish command"
    usage: "/v [level|<player> [level]]"
    permission: allium.vanish
    aliases: [vanish]
  msg:
    description: "Send a private message to player"
    usage: "/msg <player> <message>"
    aliases: [ tell, w, whisper, pm, message, m, t ]

  speed:
    description: "Set walking or flying speed"
    usage: "/speed <type> <speed> [player]"
    permission: allium.speed

  reply:
    description: "Reply to the last message received"
    usage: "/reply <message>"
    aliases: [ r ]

  mail:
    description: "Send or read offline messages"
    usage: "/mail <read|send|clear|gift|claim> [player] [message]"

  spy:
    description: "Spy on private messages"
    usage: "/spy [player]"
  help:
    description: "Displays help"
    usage: "/help [command]"
    aliases: [commands]
  spawn:
    description: "Teleports you to spawn"
    usage: "/spawn"
    aliases: [setspawn]
  
  skull:
    description: "Get a player's head"
    usage: "/skull <player>"
    permission: allium.skull
    aliases: [head, playerhead]
  
  home:
    description: "Teleports you to your home"
    usage: "/home [home]"
    permission: allium.home

  homes:
    description: "Lists your homes"
    usage: "/homes"
    permission: allium.homes
  
  sethome:
    description: "Sets a home"
    usage: "/sethome [home]"
    permission: allium.sethome
  delhome:
    description: "Deletes a home"
    usage: "/delhome [home]"
    permission: allium.delhome
    aliases: [removehome] 
    
  party:
    description: "Manage parties - create, join, leave, info, list"
    usage: "/party <create|join|leave|info|list> [name]"
    permission: allium.party
    
  locatorbar:
    description: "Control locator bar visibility - toggle, show, hide players"
    usage: "/locatorbar <toggle|show|hide> [player] [time]"
    permission: allium.locatorbar
    
  deletemsg:
    description: "Deletes a message"
    usage: "/deletemsg <id>"
    permission: allium.deletemsg
    aliases: [delmsg]

  trash:
    description: "Opens a disposal inventory that deletes items on close"
    usage: "/trash"
    permission: allium.dispose
    aliases: [dispose, disposal]
    
  handcuffs:
    description: "Manage player restraints - toggle handcuffs for self or give to others"
    usage: "/handcuffs [player]"
    permission: allium.handcuffs
    
  unrestrain:
    description: "Release all currently restrained players"
    usage: "/unrestrain"
    permission: allium.admin
    
  restore:
    description: "Restore a previous inventory"
    usage: "/restore [player]"
    permission: allium.restore
    
  # Economy commands
  balance:
    description: "Check your balance or another player's balance"
    usage: "/balance [player]"
    aliases: [bal]
    permission: allium.balance
  
  pay:
    description: "Pay another player"
    usage: "/pay <player> <amount>"
    permission: allium.pay
    
  baltop:
    description: "View the richest players"
    usage: "/baltop [page]"
    permission: allium.baltop
    
  money:
    description: "Admin command to manage player balances"
    usage: "/money <give|take|set|clear> <player> [amount]"
    permission: allium.money
  
  # Teleport Commands
  tp:
    description: "Teleport to a player or location"
    usage: "/tp [player] or /tp [x] [y] [z]"
    aliases: [tpo, teleport]
    permission: allium.tp
  
  tpa:
    description: "Request to teleport to a player"
    usage: "/tpa <player>"
    permission: allium.tpa
  
  tpcancel:
    description: "Cancel a teleport request"
    usage: "/tpcancel"
    aliases: [tpacancel]
    permission: allium.tpa
  
  tpaccept:
    description: "Accept a teleport request"
    usage: "/tpaccept [player]"
    aliases: [tpyes]
    permission: allium.tpa
  
  tpdeny:
    description: "Deny a teleport request"
    usage: "/tpdeny [player]"
    aliases: [tpno]
    permission: allium.tpa
  
  tppet:
    description: "Teleport your pets"
    usage: "/tppet"
    permission: allium.tppet
  
  tpmob:
    description: "Teleport your mobs"
    usage: "/tpmob"
    aliases: [tpentity, tpent, teleportmob, tpm, tpe]
    permission: allium.tpmob

  back:
    description: "Go back to your previous or death location"
    usage: "/back"
    permission: allium.back
  
  tppos:
    description: "Teleport to specific coordinates"
    usage: "/tppos <x> <y> <z> [yaw] [pitch]"
    permission: allium.tppos
  
  tphere:
    description: "Bring a player to your location"
    usage: "/tphere <player>"
    aliases: [s]
    permission: allium.tphere
  
  tpahere:
    description: "Request a player to teleport to you"
    usage: "/tpahere <player>"
    permission: allium.tpahere
  
  tptoggle:
    description: "Toggle teleport requests"
    usage: "/tptoggle [player]"
    permission: allium.tptoggle
  
  otp:
    description: "Teleport to a player's last known location"
    usage: "/otp <player>"
    aliases: [offlinetp, tpoffline]
    permission: allium.tp.offline
  
  top:
    description: "Teleport to the highest block"
    usage: "/top"
    permission: allium.top
  
  bottom:
    description: "Teleport to the lowest block"
    usage: "/bottom"
    permission: allium.bottom
  
  whois:
    description: "Displays detailed information about a player."
    usage: "/whois <player>"
    permission: allium.whois

  seen:
    description: "Shows information about a player including their last seen time and location"
    usage: "/seen <player>"
    permission: allium.seen

  maintenance:
    description: "Toggle maintenance mode"
    usage: "/maintenance [on|off] [reason]"
    permission: allium.admin

  withertoggle:
    description: "Toggle Wither spawning"
    usage: "/withertoggle [on|off|status]"
    permission: allium.withertoggle

  invsee:
    description: View and edit another player's inventory
    usage: /invsee <player>
    permission: allium.invsee

  enderchest:
    description: "Open a player's ender chest"
    usage: "/enderchest [player]"
    permission: allium.enderchest
    aliases: [ec, ender, echest]

  enchant:
    description: Enchant an item in hand
    usage: /enchant <enchantment> [level]
    permission: allium.enchant

  note:
    description: Add a note about a player
    usage: /note <player> <note>
    permission: allium.staff
  notes:
    description: View player notes
    usage: /notes [player]
    permission: allium.staff
  unnote:
    description: Remove a player note
    usage: /unnote <player> <id>
    permission: allium.staff

  # Time commands
  time:
    description: "Manipulate or view the time"
    usage: "/time [set|add] [time] [world]"
    permission: allium.time
  day:
    description: "Set the time to day"
    usage: "/day [set|add] [time] [world]"
    permission: allium.time
  night:
    description: "Set the time to night"
    usage: "/night [set|add] [time] [world]"
    permission: allium.time

  autorestart:
    description: "Schedule or manage server auto-restarts"
    usage: "/autorestart <help|time|now|stop|reload> [time]"
    permission: allium.autorestart.help
  ar:
    description: "Schedule or manage server auto-restarts (alias)"
    usage: "/ar <help|time|now|stop> [time]"
    permission: allium.autorestart.help
  
  warp:
    description: "Teleport to a warp or list available warps"
    usage: "/warp [warp] [player] | /warps"
    permission: allium.warp
    aliases: [warps]
  
  setwarp:
    description: "Create a new warp at your current location"
    usage: "/setwarp <name> [public]"
    permission: allium.setwarp
  
  delwarp:
    description: "Delete an existing warp"
    usage: "/delwarp <n>"
    permission: allium.delwarp
  
  warpinfo:
    description: "Display information about a warp"
    usage: "/warpinfo <n>"
    permission: allium.warpinfo

