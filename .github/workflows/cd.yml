# Release pipeline: GitHub Release + Modrinth + SpigotMC + Discord
name: Release on Tag

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty for latest tag)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (skip submissions)'
        required: false
        default: false
        type: boolean
      run_github_release:
        description: 'Create/update GitHub Release'
        required: false
        default: true
        type: boolean
      run_modrinth:
        description: 'Release to Modrinth'
        required: false
        default: true
        type: boolean
      run_spigot:
        description: 'Release to SpigotMC'
        required: false
        default: true
        type: boolean
      run_discord:
        description: 'Send Discord notification'
        required: false
        default: true
        type: boolean

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Build with Maven
        run: mvn install -DskipTests -B

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION=${{ inputs.version }}
          elif [ -n "${GITHUB_REF#refs/tags/}" ] && [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null)
          fi
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Find JAR
        id: find-jar
        run: |
          JAR=$(find target -name "Allium*.jar" -not -name "*-javadoc.jar" -not -name "*-sources.jar" | head -n1)
          echo "jar=${JAR}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE=".release/latest/v${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            TITLE=$(head -n1 "$NOTES_FILE")
            echo "title=${TITLE}" >> $GITHUB_OUTPUT
            echo "has_notes=true" >> $GITHUB_OUTPUT
          else
            echo "title=Allium v${VERSION}" >> $GITHUB_OUTPUT
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_github_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR="${{ steps.find-jar.outputs.jar }}"
          TITLE="${{ steps.notes.outputs.title }}"
          NOTES_FILE=".release/latest/v${VERSION}.md"

          ARGS=()
          if [ -n "$JAR" ]; then
            ARGS+=("$JAR")
          fi
          if [ "${{ steps.notes.outputs.has_notes }}" = "true" ]; then
            gh release create "v${VERSION}" --title "$TITLE" --notes-file "$NOTES_FILE" "${ARGS[@]}"
          else
            gh release create "v${VERSION}" --title "$TITLE" --generate-notes "${ARGS[@]}"
          fi

      # --- Step 2: Modrinth ---
      - name: Release to Modrinth
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_modrinth }}
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          REPO_NAME: Allium
          VERSION: ${{ steps.version.outputs.version }}
          JAR_PATH: ${{ steps.find-jar.outputs.jar }}
        run: |
          if [ -z "${{ steps.find-jar.outputs.jar }}" ]; then
            echo "No JAR found, skipping Modrinth"
            exit 0
          fi
          if [ -f ".release/latest/v${{ steps.version.outputs.version }}.md" ]; then
            mkdir -p /tmp/release-notes
            cp ".release/latest/v${{ steps.version.outputs.version }}.md" /tmp/release-notes/
          fi
          node .release/src/modrinth-release.js

      # --- Step 3: SpigotMC ---
      - name: Build Docker image
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_spigot }}
        run: docker build -t spigot-release-automation .release

      - name: Release to SpigotMC
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_spigot }}
        env:
          SPIGOT_USERNAME: ${{ secrets.SPIGOT_USERNAME }}
          SPIGOT_PASSWORD: ${{ secrets.SPIGOT_PASSWORD }}
          SPIGOT_COOKIES: ${{ secrets.SPIGOT_COOKIES }}
          SPIGOT_RESOURCE_IDS: ${{ secrets.SPIGOT_RESOURCE_IDS }}
          REPO_NAME: Allium
          REPO_OWNER: castledking
          VERSION: ${{ steps.version.outputs.version }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: |
          MOUNTS=""
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f ".release/latest/v${VERSION}.md" ]; then
            MOUNTS="$MOUNTS -v $(pwd)/.release/latest/v${VERSION}.md:/tmp/release-notes/v${VERSION}.md:ro"
          fi
          docker run --rm --shm-size=2g \
            -e SPIGOT_USERNAME \
            -e SPIGOT_PASSWORD \
            -e SPIGOT_COOKIES \
            -e SPIGOT_RESOURCE_IDS \
            -e REPO_NAME \
            -e REPO_OWNER \
            -e VERSION \
            -e DRY_RUN \
            $MOUNTS \
            spigot-release-automation

      # --- Step 4: Discord ---
      - name: Discord notification
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_discord) }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_NAME: Allium
          REPO_OWNER: castledking
          VERSION: ${{ steps.version.outputs.version }}
          DISCORD_CONFIG_PATH: .release/discord-updater-webhook.yml
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "No DISCORD_WEBHOOK_URL set, skipping"
            exit 0
          fi
          pip install pyyaml -q
          python3 .release/src/discord-notify.py
